# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  build-push:
    name: ${{ matrix.attrset }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          key: nix-flake-inputs-${{ hashFiles('**/flake.lock') }}
          path: /tmp/nix-cache
          restore-keys: nix-flake-inputs-
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - if: steps.cache.outputs.cache-hit == 'true'
        name: Import Nix store cache
        run: nix copy --all --no-check-sigs --from /tmp/nix-cache
      - name: Build and Export .#gc-keep to Nix store cache
        run: |
          # remove everything before copying so the cache doesn't grow over time
          sudo rm -rf /tmp/nix-cache
          nix copy --no-check-sigs --to /tmp/nix-cache .#gc-keep
      - name: Login to Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          name: budimanjojo
          skipPush: true
      - name: Build and push to Cachix
        run: |
          nix develop --command \
            just ci-build ${{ matrix.attrset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - attrset: .#nixosConfigurations.budimanjojo-firewall.config.system.build.toplevel
            runner: ubuntu-24.04
            system: x86_64-linux
          - attrset: .#nixosConfigurations.budimanjojo-main.config.system.build.toplevel
            runner: ubuntu-24.04
            system: x86_64-linux
          - attrset: .#nixosConfigurations.budimanjojo-nas.config.system.build.toplevel
            runner: ubuntu-24.04
            system: x86_64-linux
          - attrset: .#nixosConfigurations.budimanjojo-oracle.config.system.build.toplevel
            runner: ubuntu-24.04-arm
            system: aarch64-linux
          - attrset: .#homeConfigurations.budiman@budimanjojo-ubuntu.activationPackage
            runner: ubuntu-24.04
            system: x86_64-linux
name: Build Push Cache
"on":
  push:
    paths:
      - modules/**
      - packages/**
      - overlays/**
      - flake.lock
      - flake.nix
  workflow_dispatch: {}
