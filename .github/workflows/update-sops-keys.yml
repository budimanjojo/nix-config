# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  update-sops-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      - run: nix develop
      - env:
          SOPS_AGE_KEYS: ${{ secrets.SOPS_AGE_KEY }}
        run: just update-sops-keys
      - id: generate-token
        name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ secrets.BOT_APP_ID }
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - id: cpr
        name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          author: budimanjojo-bot <111944664+budimanjojo-bot[bot]@users.noreply.github.com>
          commit-message: 'chore(sops): update sops secrets with new public keys'
          committer: budimanjojo-bot <111944664+budimanjojo-bot[bot]@users.noreply.github.com>
          delete-branch: true
          title: 'chore(sops): update sops secrets with new public keys'
          token: ${{ steps.generate-token.outputs.token }}
      - env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        if: steps.cpr.outputs.pull-request-operation == 'created'
        name: Automerge
        run: gh pr merge --squash --auto ${{ steps.cpr.outputs.pull-request-number }}
name: Update SOPS Keys
"on":
  push:
    paths:
      - .sops.yaml
  schedule:
    - cron: 0 * * * *
  workflow_dispatch: {}
