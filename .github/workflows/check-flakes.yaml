---
name: Check Flakes

on:
  pull_request_target:
    types:
      - opened
      - auto_merge_enabled
  push:
    paths:
      - '**.nix'
      - flake.lock

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache
        with:
          path: /tmp/nix-cache
          key: nix-flake-inputs-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-flake-inputs-

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Import Nix store cache
        if: steps.cache.outputs.cache-hit == 'true'
        run: nix copy --all --no-check-sigs --from /tmp/nix-cache

      - name: Build and Export .#gc-keep to Nix store cache
        run: |
          # remove everything before copying so the cache doesn't grow over time
          sudo rm -rf /tmp/nix-cache
          nix copy --no-check-sigs --to /tmp/nix-cache .#gc-keep

      - id: set-matrix
        run: |
          set -Eeu
          matrix="$(nix eval --json '.#ghActions.perSystemMatrix')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  check_flakes:
    name: ${{ matrix.system }}
    needs: define-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check --print-build-logs --no-update-lock-file
